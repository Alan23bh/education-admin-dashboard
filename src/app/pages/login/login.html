<!doctype html>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>Lyman HS</h1>
        <p>Teacher Portal</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <label>
        <span>Email</span>
        <input type="email" formControlName="email" placeholder="Enter ANY valid email format" />
      </label>

      <label>
        <span>Password</span>
        <input type="password" formControlName="password" placeholder="••••••••" />
      </label>
      <p class="demo-hint">
        Demo login: Enter any valid email format (does not need to be real) and any password.
        Example: <strong>123@mail.com</strong> / <strong>123456</strong>
      </p>

      <button type="submit">Sign in</button>

      <p class="error" *ngIf="error">{{ error }}</p>
    </form>
  </div>
</div>
